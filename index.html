<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>仁濟醫院職業治療部 - 輔助工具價格比較</title>
  <style>
    :root {
      --font-scale: 1;
      --base-font: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: calc(var(--base-font) * var(--font-scale)); }
    body {
      font-family: "Noto Sans TC", Arial, sans-serif;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      min-height: 100vh;
      padding: 20px;
      font-size: 1rem;
    }
    .header { text-align: center; color: white; padding: 30px 20px 20px; }
    .header h1 { font-size: 2em; font-weight: bold; margin-bottom: 8px; }
    .header h2 { font-size: 1.3em; font-weight: normal; margin-bottom: 8px; }
    .header p  { font-size: 0.9em; opacity: 0.85; }

    /* Top settings bar: language + font size */
    .settings-bar {
      background: white; border-radius: 12px; padding: 12px 16px;
      margin: 0 auto 12px; max-width: 1000px;
      display: flex; flex-wrap: wrap; gap: 12px;
      align-items: center; justify-content: space-between;
    }
    .settings-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .settings-group .label {
      font-weight: 600; color: #2c3e50; font-size: 0.9em;
    }
    .seg-btn {
      padding: 6px 14px; border: 1px solid #27ae60; background: white;
      color: #27ae60; cursor: pointer; font-size: 0.9em; font-weight: 600;
      transition: all 0.15s;
    }
    .seg-btn:first-child { border-radius: 8px 0 0 8px; }
    .seg-btn:last-child { border-radius: 0 8px 8px 0; }
    .seg-btn:not(:first-child) { border-left: none; }
    .seg-btn.active { background: #27ae60; color: white; }
    .seg-btn:hover:not(.active) { background: #eafaf1; }
    .seg-btn[data-size] { font-family: serif; }

    .controls {
      background: white; border-radius: 12px; padding: 16px;
      margin: 0 auto; max-width: 1000px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }
    .controls select, .controls input {
      padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px;
      font-size: 0.95em; flex: 1; min-width: 160px;
    }
    .controls button {
      padding: 8px 20px; background: #27ae60; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.95em;
    }
    .controls button:hover { background: #219150; }
    #compare-bar {
      display: none; background: #fff3cd; border-radius: 12px;
      padding: 14px 20px; margin: 12px auto; max-width: 1000px; text-align: center;
    }
    #compare-bar button {
      margin: 4px 8px; padding: 8px 18px; border: none;
      border-radius: 8px; cursor: pointer; font-size: 0.9em;
    }
    #btn-compare { background: #e67e22; color: white; }
    #btn-clear   { background: #aaa; color: white; }
    #product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; max-width: 1000px; margin: 16px auto 0;
    }
    .card {
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; gap: 8px;
    }
    .card img {
      width: 100%; height: 160px; object-fit: contain;
      border-radius: 8px; background: #f5f5f5;
    }
    .card .no-img {
      width: 100%; height: 160px; background: #f0f0f0; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 2em;
    }
    .card h3 { font-size: 1em; font-weight: bold; color: #2c3e50; line-height: 1.3; }
    .card h3 .en { display: block; font-size: 0.85em; color: #666; font-weight: 500; margin-top: 2px; }
    .card .model { font-size: 0.8em; color: #888; }
    .card .price { font-size: 1.2em; color: #e74c3c; font-weight: bold; }
    .card .source { font-size: 0.8em; color: #27ae60; }
    .card .updated { font-size: 0.75em; color: #aaa; }
    .card .specs { font-size: 0.8em; color: #555; line-height: 1.5; }
    .card label { display: flex; align-items: center; gap: 6px; font-size: 0.85em; cursor: pointer; }
    .card .actions {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .card .actions a {
      flex: 1; text-align: center; padding: 8px 6px;
      border-radius: 8px; text-decoration: none;
      font-size: 0.85em; font-weight: 600;
      transition: opacity 0.2s;
    }
    .card .actions a:active { opacity: 0.7; }
    .card .actions .btn-call { background: #27ae60; color: white; }
    .card .actions .btn-web  { background: #3498db; color: white; }
    #compare-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 999; overflow-y: auto; padding: 20px;
    }
    #compare-modal .modal-inner {
      background: white; border-radius: 12px; max-width: 960px;
      margin: 0 auto; padding: 24px;
    }
    #compare-modal h2 { margin-bottom: 16px; color: #2c3e50; }
    #compare-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    #compare-table th { background: #27ae60; color: white; padding: 10px; }
    #compare-table td { padding: 10px; border: 1px solid #ddd; vertical-align: top; }
    #compare-table tr:nth-child(even) td { background: #f9f9f9; }
    #btn-close-modal {
      margin-top: 16px; padding: 10px 24px; background: #e74c3c;
      color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em;
    }
    #status { text-align: center; color: white; padding: 40px; font-size: 1.1em; }

    @media (max-width: 600px) {
      .settings-bar { flex-direction: column; align-items: stretch; }
      .settings-group { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1 data-i18n="title_dept">仁濟醫院職業治療部</h1>
  <h2 data-i18n="title_app">輔助工具</h2>
  <p data-i18n="title_subtitle">價格只作參考，詳情請查詢相關的復康公司</p>
</div>

<!-- Settings: language + font size -->
<div class="settings-bar">
  <div class="settings-group">
    <span class="label" data-i18n="settings_lang">🌐 語言 Language:</span>
    <button class="seg-btn" data-lang="zh">中文</button>
    <button class="seg-btn" data-lang="en">English</button>
    <button class="seg-btn active" data-lang="both">中英 / EN</button>
  </div>
  <div class="settings-group">
    <span class="label" data-i18n="settings_size">🔍 字體 Size:</span>
    <button class="seg-btn" data-size="0.9">A−</button>
    <button class="seg-btn active" data-size="1">A</button>
    <button class="seg-btn" data-size="1.25">A+</button>
    <button class="seg-btn" data-size="1.5">A++</button>
  </div>
</div>

<div class="controls">
  <select id="filter-category">
    <option value="" data-i18n="cat_all">所有類別 / All categories</option>
    <option value="wheelchair" data-i18n="cat_wheelchair">輪椅 / Wheelchair</option>
    <option value="shower" data-i18n="cat_shower">沐浴椅 / Shower chair</option>
    <option value="toilet" data-i18n="cat_toilet">便椅 / 廁所加高 / Commode</option>
    <option value="handrail" data-i18n="cat_handrail">扶手 / Handrail</option>
    <option value="bedrail" data-i18n="cat_bedrail">床邊扶手 / Bed rail</option>
    <option value="ramp" data-i18n="cat_ramp">斜台板 / Ramp</option>
    <option value="bathboard" data-i18n="cat_bathboard">沐浴板 / Bath board</option>
    <option value="mattress" data-i18n="cat_mattress">氣墊床褥 / Mattress</option>
    <option value="walker" data-i18n="cat_walker">助行架 / Walker</option>
    <option value="reacher" data-i18n="cat_reacher">長柄夾 / Reacher</option>
    <option value="sockaid" data-i18n="cat_sockaid">穿襪器 / Sock aid</option>
  </select>
  <select id="filter-source"><option value="" data-i18n="src_all">所有供應商 / All suppliers</option></select>
  <input id="search-input" type="text" data-i18n-attr="placeholder" data-i18n="search_placeholder" placeholder="搜尋產品名稱 / Search products..." />
  <button onclick="applyFilters()" data-i18n="btn_search">🔎 搜尋 / Search</button>
</div>

<div id="compare-bar">
  <span data-i18n="cmp_selected">已選 / Selected</span>
  <span id="compare-count">0</span>
  <span data-i18n="cmp_max">件產品（最多4件） / items (max 4)</span>
  <button id="btn-compare" onclick="showCompare()" data-i18n="btn_compare">比較 Compare</button>
  <button id="btn-clear"   onclick="clearCompare()" data-i18n="btn_clear">清除 Clear</button>
</div>

<div id="product-grid"><div id="status" data-i18n="loading">正在載入產品資料... / Loading products...</div></div>

<div id="compare-modal">
  <div class="modal-inner">
    <h2 data-i18n="cmp_title">產品比較 / Product Comparison</h2>
    <div style="overflow-x:auto"><table id="compare-table"></table></div>
    <button id="btn-close-modal" onclick="closeCompare()" data-i18n="btn_close">關閉 Close</button>
  </div>
</div>

    label_product: 'Product', label_model: 'Model', label_price: 'Price',
    label_supplier: 'Supplier', label_category: 'Category', label_specs: 'Specs',
    label_phone: 'Phone', label_web: 'Website', label_updated: 'Updated', label_item: 'Item',
    updated: 'Updated: ',

  both: {

    title_subtitle: '價格只作參考，詳情請查詢相關的復康公司 / Prices for reference only — please contact the supplier.',

    cat_ramp: '斜台板 / Ramp', cat_bathboard: '沐浴板 / Bath board', cat_mattress: '氣墊床褥 / Mattress', cat_walker: '助行架 / Walker',
    cat_reacher: '長柄夾 / Reacher', cat_sockaid: '穿襪器 / Sock aid',

    cmp_selected: '已選 / Selected', cmp_max: '件 (最多4件 / max 4)',
    btn_compare: '比較 / Compare', btn_clear: '清除 / Clear',
    loading: '正在載入 / Loading...', no_match: '找不到符合產品 / No match',
    load_fail: '載入失敗 / Failed: ', no_data: '暫時沒有產品 / No products',
    cmp_title: '產品比較 / Product Comparison', btn_close: '關閉 / Close',
    no_product: '未知產品 / Unknown',
    label_product: '產品名稱 / Product', label_model: '型號 / Model', label_price: '價格 / Price',
    label_supplier: '供應商 / Supplier', label_category: '類別 / Category', label_specs: '規格 / Specs',
    label_phone: '電話 / Phone', label_web: '網頁 / Website', label_updated: '更新日期 / Updated', label_item: '項目 / Item',
    updated: '更新 / Updated: ',
    btn_call_text: '一按即打 / Call', btn_web_text: '產品網頁 / Page',
    alert_max: '最多選4件產品 / Max 4 products', alert_min: '請選至少2件 / Pick at least 2',
  }
};

const CATEGORY_LABELS = {
  zh: { wheelchair:'輪椅', shower:'沐浴椅', toilet:'便椅/廁所加高', handrail:'扶手',
        bedrail:'床邊扶手', ramp:'斜台板', bathboard:'沐浴板', mattress:'氣墊床褥', walker:'助行架',
        reacher:'長柄夾/取物器', sockaid:'穿襪器' },
  en: { wheelchair:'Wheelchair', shower:'Shower chair', toilet:'Commode', handrail:'Handrail',
        bedrail:'Bed rail', ramp:'Ramp', bathboard:'Bath board', mattress:'Mattress', walker:'Walker',
        reacher:'Reacher / Grabber', sockaid:'Sock aid' },
  both: { wheelchair:'輪椅 / Wheelchair', shower:'沐浴椅 / Shower', toilet:'便椅 / Commode',
          handrail:'扶手 / Handrail', bedrail:'床邊扶手 / Bed rail', ramp:'斜台板 / Ramp',
          bathboard:'沐浴板 / Bath board', mattress:'氣墊床褥 / Mattress', walker:'助行架 / Walker',
          reacher:'長柄夾 / Reacher', sockaid:'穿襪器 / Sock aid' }
};

// English product-name translations (lookup by model). Add more as you go.
const PRODUCT_EN = {
  'AD-0171': 'Advanced 7510 Multi-functional Lightweight Wheelchair',
  'ALP-DS1807PF-T05': 'Alpha® T05 Self-propelled Wheelchair (Large Wheel)',
  'GHM-WC-EX2': 'Invacare Tracer EX2 Multi-functional Wheelchair',
  'H508': 'Folding-back Manual Wheelchair',
  'FHW-13': 'Functional Aluminium Small-wheel Manual Wheelchair',
  'TTST-0004 / RE30': 'Advanced RE30 High-back Reclining Wheelchair (172°)',
  'ALP-RW1611P-F-V1': 'Alpha® High-back Reclining Wheelchair (180°)',
  'GHM-WC-RC': 'Reclining High-back Wheelchair (Elevating Leg Rest)',
  'VA3000': 'Japanese-style Aluminium Wheelchair',
  'ECM00407': 'Fixed Commode Chair',
  'CA1360': 'Folding Shower & Commode Chair',
  'H-61-G-5-PW3': 'Stainless Steel Shower/Commode Chair (Drop-down arms + Tilt-bar)',
  'CS880A': '4-wheel Shower/Commode Chair (Flip-up arms) V-Chair',
  'GHM-SC-CM01': 'Aluminium Shower/Commode Chair',
  'ECM30442 / ECM30444S': '304 Stainless Steel Shower/Commode Chair (Optional Tilt-bar)',
  'FS-798L': 'High-back Shower Chair',
  'ST-D1004': 'Japanese-style Swivel Shower Chair',
  'NOT-P42434': 'No-install Extendable Bed Rail',
  'WOH-TRRUB-RUB-1525-2': 'WONSH® Rubber Ramp',
  'RX-AM40A': 'ROSSMAX Strip Air Mattress',
  'WA200': 'Folding Wheelchair Ramp',
};

// English supplier-name translations
const SUPPLIER_EN = {
  '盈康 Healthy Living': 'Healthy Living',
  '真善美醫護': 'Just Med',
  '家得康醫療用品': 'Get Health Medical',
  '信義醫療': 'Justice Medical',
  '唯健康 Health Top': 'Health Top',
  '康健醫療用品': 'Medicare HK',
  '卓越醫療器材': 'Supreme Medical',
  '復康速遞': 'Rehab Express',
  'Easy66': 'Easy66',
};

let currentLang = localStorage.getItem('lang') || 'both';
let currentSize = parseFloat(localStorage.getItem('size') || '1');

function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || I18N.zh[key] || key; }

function applyI18N() {
  document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-HK';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const attr = el.dataset.i18nAttr;
    if (attr) el.setAttribute(attr, t(key));
    else el.textContent = t(key);
  });
  // Update lang button states
  document.querySelectorAll('.seg-btn[data-lang]').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
}

function applyFontSize() {
  document.documentElement.style.setProperty('--font-scale', currentSize);
  document.querySelectorAll('.seg-btn[data-size]').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.size) === currentSize);
  });
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  applyI18N();
  renderCards(window._lastFiltered || allProducts);
}

function setFontSize(size) {
  currentSize = size;
  localStorage.setItem('size', String(size));
  applyFontSize();
}

/* ===== Helpers to bilingual-format text ===== */
function nameWithEn(p) {
  const zh = p.product_name || t('no_product');
  const en = PRODUCT_EN[p.model] || PRODUCT_EN[(p.model||'').split(' / ')[0]] || '';
  if (currentLang === 'en' && en) return en;
  if (currentLang === 'both' && en) return `${zh}<span class="en">${en}</span>`;
  return zh;
}

function supplierName(p) {
  const zh = p.source_name || p.source || '';
  const en = SUPPLIER_EN[zh] || '';
  if (currentLang === 'en' && en) return en;
  if (currentLang === 'both' && en && en !== zh) return `${zh} / ${en}`;
  return zh;
}

/* ===== Data loading & rendering ===== */
async function loadProducts() {
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allProducts = Array.isArray(data) ? data : (data.products || []);
    if (allProducts.length === 0) throw new Error(t('no_data'));
    populateSourceFilter();
    renderCards(allProducts);
  } catch (e) {
    document.getElementById('product-grid').innerHTML =
      '<div id="status">' + t('load_fail') + e.message + '</div>';
  }
}

function populateSourceFilter() {
  const sources = [...new Set(allProducts.map(p => p.source_name || p.source).filter(Boolean))];
  const sel = document.getElementById('filter-source');
  sources.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    const en = SUPPLIER_EN[s];
    opt.textContent = (currentLang === 'en' && en) ? en
                    : (currentLang === 'both' && en && en !== s) ? `${s} / ${en}` : s;
    sel.appendChild(opt);
  });
}

function renderCards(products) {
  window._lastFiltered = products;
  const grid = document.getElementById('product-grid');
  if (products.length === 0) {
    grid.innerHTML = `<div id="status">${t('no_match')}</div>`;
    return;
  }
  grid.innerHTML = '';
  products.forEach((p, i) => {
    const id = p.id || i;
    const card = document.createElement('div');
    card.className = 'card';
    const imgHTML = p.image_url
      ? `<img src="${p.image_url}" alt="${p.product_name || ''}" onerror="this.style.display='none'">`
      : `<div class="no-img">🦽</div>`;
    const specs = parseJSON(p.specs);
    const specsHTML = specs.length ? `<div class="specs">${specs.slice(0,3).join(' · ')}</div>` : '';
    const checked = compareList.includes(String(id)) ? 'checked' : '';
    const pData = JSON.stringify(p).replace(/\\/g,'\\\\').replace(/"/g,'&quot;');
    const phoneClean = (p.phone || '').replace(/\s+/g, '');
    const callBtn = phoneClean
      ? `<a class="btn-call" href="tel:${phoneClean}">📞 ${p.phone}</a>`
      : '';
    const webBtn = p.product_url
      ? `<a class="btn-web" href="${p.product_url}" target="_blank" rel="noopener">🌐 ${t('btn_web_text')}</a>`
      : '';
    const actionsHTML = (callBtn || webBtn)
      ? `<div class="actions">${callBtn}${webBtn}</div>`
      : '';
    card.innerHTML = `
      ${imgHTML}
      <h3>${nameWithEn(p)}</h3>
      <div class="model">${p.model || ''}</div>
      <div class="price">${p.price_display || 'HK$ N/A'}</div>
      <div class="source">📦 ${supplierName(p)}</div>
      ${specsHTML}
      ${actionsHTML}
      <div class="updated">${t('updated')}${p.updated_date || p.last_checked || 'N/A'}</div>
      <label><input type="checkbox" ${checked} data-id="${id}" data-product="${pData}" onchange="toggleCompare(this)"> ${t('btn_compare')}</label>
    `;
    grid.appendChild(card);
  });
}

function parseJSON(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  try { return JSON.parse(val); } catch { return []; }
}

function applyFilters() {
  const cat = document.getElementById('filter-category').value;
  const src = document.getElementById('filter-source').value;
  const q   = document.getElementById('search-input').value.toLowerCase();
  renderCards(allProducts.filter(p => {
    return (!cat || p.category === cat)
        && (!src || (p.source_name || p.source) === src)
        && (!q   || (p.product_name||'').toLowerCase().includes(q) || (p.model||'').toLowerCase().includes(q));
  }));
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key==='Enter') applyFilters(); });

function toggleCompare(checkbox) {
  const id = String(checkbox.dataset.id);
  if (checkbox.checked) {
    if (compareList.length >= 4) { alert(t('alert_max')); checkbox.checked = false; return; }
    compareList.push(id);
    const raw = checkbox.dataset.product.replace(/&quot;/g,'"');
    try { window._compareData[id] = JSON.parse(raw); } catch(e) {}
  } else {
    compareList = compareList.filter(x => x !== id);
    delete window._compareData[id];
  }
  updateCompareBar();
}

function updateCompareBar() {
  document.getElementById('compare-count').textContent = compareList.length;
  document.getElementById('compare-bar').style.display = compareList.length > 0 ? 'block' : 'none';
}

function clearCompare() {
  compareList = []; window._compareData = {}; updateCompareBar();
  document.querySelectorAll('.card input[type=checkbox]').forEach(c => c.checked = false);
}

function showCompare() {
  const items = compareList.map(id => window._compareData[id]).filter(Boolean);
  if (items.length < 2) { alert(t('alert_min')); return; }
  const catMap = CATEGORY_LABELS[currentLang] || CATEGORY_LABELS.zh;
  const rows = [
    [t('label_product'), p => nameWithEn(p) || '-'],
    [t('label_model'),     p => p.model||'-'],
    [t('label_price'),     p => p.price_display||'-'],
    [t('label_supplier'),  p => supplierName(p)||'-'],
    [t('label_category'),  p => catMap[p.category]||p.category||'-'],
    [t('label_specs'),     p => parseJSON(p.specs).join('<br>')||'-'],
    [t('label_phone'),     p => {
      if (!p.phone) return '-';
      const clean = p.phone.replace(/\s+/g, '');
      return `<a href="tel:${clean}" style="color:#27ae60;font-weight:600;text-decoration:none">📞 ${p.phone}</a>`;
    }],
    [t('label_web'),     p => p.product_url
      ? `<a href="${p.product_url}" target="_blank" rel="noopener" style="color:#3498db;text-decoration:none">🌐 ${t('btn_web_text')}</a>`
      : '-'],
    [t('label_updated'), p => p.updated_date||'-'],
  ];
  let html = `<tr><th>${t('label_item')}</th>` + items.map(p=>`<th>${nameWithEn(p)||'-'}</th>`).join('') + '</tr>';
  rows.forEach(([label, fn]) => {
    html += `<tr><td><strong>${label}</strong></td>` + items.map(p=>`<td>${fn(p)}</td>`).join('') + '</tr>';
  });
  document.getElementById('compare-table').innerHTML = html;
  document.getElementById('compare-modal').style.display = 'block';
}

function closeCompare() { document.getElementById('compare-modal').style.display = 'none'; }

/* ===== Wire up settings buttons ===== */
document.querySelectorAll('.seg-btn[data-lang]').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});
document.querySelectorAll('.seg-btn[data-size]').forEach(b => {
  b.addEventListener('click', () => setFontSize(parseFloat(b.dataset.size)));
});

/* ===== Init ===== */
applyI18N();
applyFontSize();
loadProducts();
</script>
</body>
</html>
